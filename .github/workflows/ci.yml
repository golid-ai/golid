name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  COVERPKG: ./internal/apperror/...,./internal/config/...,./internal/handler/...,./internal/middleware/...,./internal/observability/...,./internal/pagination/...,./internal/queue/...,./internal/retry/...,./internal/service/...,./internal/validate/...,./internal/wire/...

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      openapi: ${{ steps.filter.outputs.openapi }}
      docs: ${{ steps.filter.outputs.docs }}
      workflow: ${{ steps.filter.outputs.workflow }}
      run_backend: ${{ steps.run_flags.outputs.run_backend }}
      run_frontend: ${{ steps.run_flags.outputs.run_frontend }}
      run_e2e: ${{ steps.run_flags.outputs.run_e2e }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Use git diff on push; REST API on pull_request (needs pull-requests: read).
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            openapi:
              - 'backend/openapi.yaml'
            docs:
              - 'docs/**'
              - '.cursor/**'
              - '**/*.md'
            workflow:
              - '.github/workflows/**'

      - name: Compute docs-only and run flags
        id: run_flags
        env:
          BACKEND: ${{ steps.filter.outputs.backend }}
          FRONTEND: ${{ steps.filter.outputs.frontend }}
          OPENAPI: ${{ steps.filter.outputs.openapi }}
          DOCS: ${{ steps.filter.outputs.docs }}
          WORKFLOW: ${{ steps.filter.outputs.workflow }}
        run: |
          docs_only=false
          if [ "$DOCS" = "true" ] && [ "$BACKEND" != "true" ] && [ "$FRONTEND" != "true" ] && [ "$OPENAPI" != "true" ] && [ "$WORKFLOW" != "true" ]; then
            docs_only=true
          fi
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

          if [ "$WORKFLOW" = "true" ] || [ "$BACKEND" = "true" ] || [ "$OPENAPI" = "true" ]; then
            echo "run_backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_backend=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$WORKFLOW" = "true" ] || [ "$FRONTEND" = "true" ] || [ "$OPENAPI" = "true" ]; then
            echo "run_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_frontend=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$docs_only" = "false" ]; then
            echo "run_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_e2e=false" >> "$GITHUB_OUTPUT"
          fi

  spec-drift:
    name: Spec Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for spec drift
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            scripts/check_spec_drift.sh origin/${{ github.base_ref }}
          else
            scripts/check_spec_drift.sh HEAD~1
          fi

      - name: Check citation freshness
        run: scripts/check_citation_freshness.sh

      - name: Check rule health
        run: scripts/check_rule_health.sh

  backend-unit:
    name: Backend Unit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_backend == 'true'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: backend
          version: v2.10.1

      - name: Unit tests (pure packages, no race)
        run: |
          go test ./internal/apperror/... ./internal/config/... ./internal/pagination/... \
            ./internal/retry/... ./internal/validate/... \
            -count=1 \
            -coverprofile=coverage-unit-norace.out \
            -coverpkg=${{ env.COVERPKG }}

      - name: Unit tests (race)
        run: |
          go test ./internal/handler/... ./internal/middleware/... ./internal/observability/... \
            ./internal/queue/... ./internal/service/... ./internal/testutil/... ./internal/wire/... \
            -race -count=1 \
            -coverprofile=coverage-unit-race.out \
            -coverpkg=${{ env.COVERPKG }}

      - name: Merge unit coverage
        run: |
          head -1 coverage-unit-norace.out > coverage-unit.out
          tail -n +2 coverage-unit-norace.out >> coverage-unit.out
          tail -n +2 coverage-unit-race.out >> coverage-unit.out

      - name: Security Scan
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4 && govulncheck ./...

      - name: Upload unit coverage
        uses: actions/upload-artifact@v6
        with:
          name: backend-coverage-unit
          path: backend/coverage-unit.out
          retention-days: 1

  backend-integration:
    name: Backend Integration (${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: [changes, backend-unit]
    if: needs.changes.outputs.run_backend == 'true'
    strategy:
      fail-fast: true
      matrix:
        shard: [handler, service]
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: golid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Integration Tests
        # Each package migrates an isolated schema (it_<pkg>_<pid>) via testutil.
        # Shards run on separate runners.
        run: |
          go test -tags integration ./internal/${{ matrix.shard }}/... \
            -race -count=1 \
            -coverprofile=coverage-integration-${{ matrix.shard }}.out \
            -coverpkg=${{ env.COVERPKG }}
        env:
          TEST_DATABASE_URL: postgres://test:test@localhost:5432/golid_test?sslmode=disable
          TEST_MIGRATIONS_PATH: ${{ github.workspace }}/backend/migrations

      - name: Upload integration coverage
        uses: actions/upload-artifact@v6
        with:
          name: backend-coverage-integration-${{ matrix.shard }}
          path: backend/coverage-integration-${{ matrix.shard }}.out
          retention-days: 1

  backend-coverage:
    name: Backend Coverage
    runs-on: ubuntu-latest
    needs: [changes, backend-unit, backend-integration]
    if: |
      always() &&
      needs.changes.outputs.run_backend == 'true' &&
      needs.backend-unit.result == 'success' &&
      needs.backend-integration.result == 'success'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          # Merge-only job — no compile; skip build cache restore (avoids stale tar warnings).
          cache: false

      - uses: actions/download-artifact@v7
        with:
          pattern: backend-coverage-*
          merge-multiple: true
          path: backend

      - name: Merge coverage profiles
        run: |
          head -1 coverage-unit.out > coverage.out
          tail -n +2 coverage-unit.out >> coverage.out
          for shard in handler service; do
            f="coverage-integration-${shard}.out"
            if [ -f "$f" ]; then
              tail -n +2 "$f" >> coverage.out
            fi
          done

      - name: Coverage Summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload Coverage
        uses: codecov/codecov-action@v6
        with:
          flags: backend
          files: backend/coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: golid-ai/golid
          fail_ci_if_error: true
          verbose: true
          skip_validation: true
          plugins: noop

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.run_frontend == 'true'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check for duplicate OpenAPI path keys
        run: |
          dupes=$(grep -E '^  /\S+:' ../backend/openapi.yaml | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "Duplicate OpenAPI path keys detected:"
            echo "$dupes"
            exit 1
          fi

      - name: Validate OpenAPI spec
        run: npx --yes @apidevtools/swagger-cli@4.0.4 validate ../backend/openapi.yaml

      - name: Generate API types from OpenAPI
        run: npm run generate:types

      - name: Type Check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage

      - name: Upload Coverage
        uses: codecov/codecov-action@v6
        with:
          flags: frontend
          files: frontend/coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: golid-ai/golid
          fail_ci_if_error: true
          verbose: true
          skip_validation: true

      # Flags known vulnerabilities in dependencies (non-blocking).
      # Transitive dep vulns in vinxi/@solidjs/start often need upstream patches.
      - name: Audit
        run: |
          npm audit --audit-level=high || {
            echo "::warning::npm audit reported high-severity issues — see log above (non-blocking)"
            exit 0
          }

  scaffold-verify:
    name: Scaffold Verify
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.run_backend == 'true' ||
      needs.changes.outputs.run_frontend == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: cd frontend && npm ci

      - name: Verify Scaffold Output Compiles
        run: make verify-scaffold

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: [changes, backend-integration, frontend]
    if: |
      always() &&
      needs.changes.outputs.run_e2e == 'true' &&
      (needs.changes.outputs.run_backend != 'true' || needs.backend-integration.result == 'success') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - name: Create env file
        run: |
          cp config/.env.example config/.env.local
          JWT=$(openssl rand -hex 32)
          sed -i "s/CHANGE_ME_64_CHAR_HEX_STRING_AT_LEAST_32_CHARS/$JWT/" config/.env.local

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile.dev
          push: false
          load: true
          tags: golid-backend:latest
          cache-from: type=gha,scope=golid-e2e-backend
          cache-to: type=gha,mode=max,scope=golid-e2e-backend

      - name: Start Stack
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci-e2e.yml up -d db
          docker compose -f docker-compose.yml -f docker-compose.ci-e2e.yml up -d backend --no-build --pull never

      - name: Wait for DB
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T db pg_isready -U dev && break || sleep 2
          done

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Run Migrations
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.18.1
          migrate -path backend/migrations -database "postgres://dev:dev@localhost:5432/golid?sslmode=disable" up

      - name: Seed Data
        run: docker compose exec -T db psql -U dev -d golid -f /dev/stdin < backend/seeds/dev_seed.sql

      - name: Wait for Backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ready && break || sleep 2
          done

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: cd frontend && npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright
        run: |
          cd frontend
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
            npx playwright install chromium
          else
            npx playwright install --with-deps chromium
          fi

      # Docker Compose provides backend + db.
      # Playwright's webServer config starts the frontend dev server automatically.
      - name: Run E2E
        run: cd frontend && npx playwright test
        timeout-minutes: 10
