steps:
- name: 'gcr.io/cloud-builders/docker'
  args:
  - 'build'
  - '--tag'
  - '${_TAG}'
  - '--file'
  - 'Dockerfile.prod'
  - '--platform'
  - 'linux/amd64'
  - '--build-arg'
  - 'VITE_OG_URL=${_VITE_OG_URL}'
  - '--build-arg'
  - 'VITE_API_URL=${_VITE_API_URL}'
  - '.'
images:
- '${_TAG}'
substitutions:
  _TAG: 'default-tag'
  _VITE_OG_URL: ''
  _VITE_API_URL: ''
